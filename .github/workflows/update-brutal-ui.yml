name: Update brutal-ui

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: update-brutal-ui
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update brutal-ui dependency
        shell: bash
        run: |
          BEFORE=$(node -p "require('./package.json').dependencies['@eliancodes/brutal-ui']")
          echo "Current declared version: $BEFORE"
          pnpm up @eliancodes/brutal-ui@latest
          AFTER=$(node -p "require('./package.json').dependencies['@eliancodes/brutal-ui']")
          echo "Updated declared version: $AFTER"

      - name: Verify changes
        run: |
          pnpm run check
          pnpm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/update-brutal-ui
          commit-message: 'deps: update @eliancodes/brutal-ui'
          assignees: eliancodes
          title: 'deps: update @eliancodes/brutal-ui'
          body: Update `@eliancodes/brutal-ui` to the latest published version and verify the site still checks and builds.
          labels: dependencies
